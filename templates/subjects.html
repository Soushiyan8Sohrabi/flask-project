<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Subjects</title>
</head>
<body>
    <ul>
        {% for topic in topics%}
            <li>{{topic}}</li>
        {% endfor %}

        {% if topics|length > 3 %}
            <p>You have lots of subjects!</p>
        {% else %}
            <p>You have a few subjects!</p>
        {% endif %}
    </ul>
</body>
</html>
